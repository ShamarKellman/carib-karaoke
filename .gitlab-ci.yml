image: 'lorisleiva/laravel-docker:8.2'

variables:
  MYSQL_ROOT_PASSWORD: password
  MYSQL_DATABASE: testing

services:
  - 'mysql:5.7'

composer:
  stage: prepare
  cache:
    key: ${CI_COMMIT_REF_SLUG}-composer
    paths:
      - vendor/
  script:
    - cp .env.testing .env
    - composer install --no-interaction
    - php artisan key:generate
    - php artisan migrate:fresh --force
    - php artisan optimize
    - chown -R $USER:www-data storage bootstrap/cache
    - chmod -R 775 storage bootstrap/cache
  artifacts:
    expire_in: 1 month
    paths:
      - vendor/
      - .env


npm:
  stage: prepare
  cache:
    key: ${CI_COMMIT_REF_SLUG}-npm
    paths:
      - node_modules/
  script:
    - npm install
    - npm run production
  artifacts:
    expire_in: 1 month
    paths:
      - node_modules/
      - public/css/
      - public/js/

pest:
  dependencies:
    - composer
    - npm
  stage: test
  script:
    - composer test

pint:
  dependencies:
    - composer
  stage: test
  script:
    - composer pint

stan:
  dependencies:
    - composer
  stage: test
  script:
    - composer stan
